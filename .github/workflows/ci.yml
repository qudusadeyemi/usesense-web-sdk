name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  sdk:
    name: SDK - Lint, Type Check, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm run typecheck
      - run: npm run build
      - name: Verify package contents
        run: npm pack --dry-run

  demo:
    name: Demo - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/sdk
      - run: npm run build -w packages/demo
