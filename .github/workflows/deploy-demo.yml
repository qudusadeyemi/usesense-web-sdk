name: Deploy Demo

on:
  push:
    branches: [main, staging]

jobs:
  deploy:
    name: Deploy demo to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -w packages/sdk
      - run: npm run build -w packages/demo
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_API_KEY: ${{ vars.NEXT_PUBLIC_API_KEY }}
      # Vercel deployment can also be handled via Vercel's GitHub integration
      # which auto-deploys on push. This workflow builds to verify correctness.
